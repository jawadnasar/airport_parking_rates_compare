<!DOCTYPE html>
<html>

<head>
    <title>Airport Parking Extension</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <script src="js/popup.js"></script>
</head>

<body>

    <h3>Airport Parking</h3>
    <form id="parkingForm">
        <label for="fromDate">From Date:</label>
        <input type="date" id="fromDate" name="fromDate" required><br><br>

        <label for="toDate">To Date:</label>
        <input type="date" id="toDate" name="toDate" required><br><br>
        <label for="gapDays">Gap of Days:</label>
        <select id="gapDays" name="gapDays" required>
            <option value="">Select gap</option>
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7" selected>7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15">15</option>
            <option value="16">16</option>
            <option value="17">17</option>
            <option value="18">18</option>
            <option value="19">19</option>
            <option value="20">20</option>
            <option value="21">21</option>
            <option value="22">22</option>
            <option value="23">23</option>
            <option value="24">24</option>
            <option value="25">25</option>
            <option value="26">26</option>
            <option value="27">27</option>
            <option value="28">28</option>
            <option value="29">29</option>
            <option value="30">30</option>
        </select><br><br>

        <label>
            <input type="checkbox" id="lookingForParking" name="parkingType" value="looking">
            Looking for parking
        </label><br>
        <label>
            <input type="checkbox" id="simplyParking" name="parkingType" value="simply">
            Simply parking
        </label><br>
        <label>
            <input type="checkbox" id="compareParking" name="parkingType" value="compare">
            Compare parking
        </label><br><br>
        <button type="submit" id="saveBtn">Start Compare</button>
    </form>
    <div id="output"></div>
</body>

</html>
